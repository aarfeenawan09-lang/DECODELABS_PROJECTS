<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | GameHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./1.css">
    <link rel="stylesheet" href="./login.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Game<span>Hub</span></div>
            <ul class="nav-list">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./about.html">About</a></li>
                <li><a href="./contact.html">Contact us</a></li>
                <li><a href="./login.html" class="active" aria-current="page">Log-in</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="login-section">
            <form class="login-card" action="#" method="post">
                <h1>Welcome Back</h1>
                <p class="subtitle">Log in to track orders and manage your account.</p>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Log In</button>

                <p class="signup-link">
                    Don't have an account? <a href="#">Sign up</a>
                </p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 GameHub. All rights reserved.</p>
    </footer>

</body>
</html>
